<line x1="388" y1="282" x2="388" y2="336" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 4"/>
<text x="142" y="352" text-anchor="middle" fill="#6b7280" font-size="13">Hawthorne</text>
<text x="262" y="352" text-anchor="middle" fill="#6b7280" font-size="13">cognitive turn</text>
<text x="388" y="352" text-anchor="middle" fill="#6b7280" font-size="13">Kahneman, Jacobs</text>

<text x="562" y="92" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">AI, today</text>
<path d="M562 110 L562 156" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 9" marker-end="url(#mwa)"/>

<rect x="484" y="158" width="156" height="224" rx="14" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>

<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
<title>Forty years of users smuggling emotion back into text channels that shipped without it</title>
<desc>A timeline with five markers. From left: the first smiley :-) in 1982; emoji in 1999 from Japan; reactions like hearts and thumbs; voice notes that bring tone back; and "lol" and "haha" used as cushions, not laughs. The line is labelled the channel, shipped without feeling. Every marker is the same event: feeling, forced back in by the users themselves.</desc>

<g>
<rect x="40" y="70" width="112" height="56" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="96" y="92" text-anchor="middle" dominant-baseline="central" fill="#0F6E56" font-size="14" font-weight="500">:-)</text>
<text x="96" y="110" text-anchor="middle" dominant-baseline="central" fill="#1D9E75" font-size="12">1982, smiley</text>
<rect x="162" y="70" width="112" height="56" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="218" y="92" text-anchor="middle" dominant-baseline="central" fill="#0F6E56" font-size="14" font-weight="500">Emoji</text>
<text x="218" y="110" text-anchor="middle" dominant-baseline="central" fill="#1D9E75" font-size="12">1999, Japan</text>
<rect x="284" y="70" width="112" height="56" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="340" y="92" text-anchor="middle" dominant-baseline="central" fill="#0F6E56" font-size="14" font-weight="500">Reactions</text>
<text x="340" y="110" text-anchor="middle" dominant-baseline="central" fill="#1D9E75" font-size="12">hearts, thumbs</text>
<rect x="406" y="70" width="112" height="56" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="462" y="92" text-anchor="middle" dominant-baseline="central" fill="#0F6E56" font-size="14" font-weight="500">Voice notes</text>
<text x="462" y="110" text-anchor="middle" dominant-baseline="central" fill="#1D9E75" font-size="12">tone returns</text>
<rect x="528" y="70" width="112" height="56" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="584" y="92" text-anchor="middle" dominant-baseline="central" fill="#0F6E56" font-size="14" font-weight="500">"lol", "haha"</text>
<text x="584" y="110" text-anchor="middle" dominant-baseline="central" fill="#1D9E75" font-size="12">cushions</text>
</g>

<line x1="96" y1="134" x2="96" y2="222" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 4"/>
<line x1="218" y1="134" x2="218" y2="222" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 4"/>
<line x1="340" y1="134" x2="340" y2="222" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 4"/>
<line x1="462" y1="134" x2="462" y2="222" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 4"/>
<line x1="584" y1="134" x2="584" y2="222" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 4"/>

<line x1="56" y1="230" x2="624" y2="230" stroke="#9ca3af" stroke-width="1"/>
<circle cx="96" cy="230" r="6" fill="#1D9E75"/>
<circle cx="218" cy="230" r="6" fill="#1D9E75"/>
<circle cx="340" cy="230" r="6" fill="#1D9E75"/>
<circle cx="462" cy="230" r="6" fill="#1D9E75"/>
<circle cx="584" cy="230" r="6" fill="#1D9E75"/>

<text x="340" y="268" text-anchor="middle" fill="#6b7280" font-size="13">the channel, shipped without feeling</text>
</svg>
